name: PR Test Build
permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Run build
      run: pnpm build

    - name: Run lint
      run: pnpm lint

    - name: Check for build errors
      run: |
        if [ $? -ne 0 ]; then
          echo "Build failed"
          exit 1
        fi
